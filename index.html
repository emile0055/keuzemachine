<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuzemachine</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eeeeee;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
}

.app{
max-width:520px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.resultaat,
.instellingen{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 5px 15px #bbb;
margin-bottom:20px;
}

.regel{
display:flex;
justify-content:space-between;
font-size:22px;
margin:12px 0;
}

.waarde{
font-weight:bold;
color:#0066cc;
}

.slot{
height:75px;
background:white;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
box-shadow:0 4px 10px #ccc;
margin-bottom:20px;
}

button{
width:100%;
height:65px;
border:0;
border-radius:18px;
margin:8px 0;
font-size:24px;
font-weight:bold;
color:white;
}

.b1{background:#1976d2;}
.b2{background:#388e3c;}
.b3{background:#f57c00;}
.b4{background:#c2185b;}
.inst{background:#555;}
.opslaan{background:#00897b;}
.reset{background:#777;}

input{
width:100%;
height:42px;
font-size:18px;
margin:4px 0;
padding:8px;
border-radius:8px;
border:1px solid #aaa;
}


.draaien{
animation:draai .08s infinite;
}


@keyframes draai{

0%{transform:translateY(-5px);}
50%{transform:translateY(5px);}
100%{transform:translateY(-5px);}

}

.verberg{
display:none;
}

</style>

</head>

<body>


<div class="app">


<div id="spel">

<h1>🎰 Keuzemachine</h1>


<div class="resultaat">

<div class="regel">
<span>Handeling</span>
<span id="uit1" class="waarde">-</span>
</div>

<div class="regel">
<span>Attributen</span>
<span id="uit2" class="waarde">-</span>
</div>

<div class="regel">
<span>Duur</span>
<span id="uit3" class="waarde">-</span>
</div>

<div class="regel">
<span>Aantal</span>
<span id="uit4" class="waarde">-</span>
</div>

</div>


<div id="slot" class="slot">
Druk op een knop
</div>


<button class="b1" id="knop1">Handeling</button>

<button class="b2" id="knop2">Attributen</button>

<button class="b3" id="knop3">Duur</button>

<button class="b4" id="knop4">Aantal</button>

<button class="inst" id="naarInstellingen">
⚙️ Instellingen
</button>


</div>





<div id="instellingen" class="verberg">


<h1>⚙️ Instellingen</h1>


<div class="instellingen" id="velden">

</div>


<button class="opslaan" id="opslaan">
💾 Opslaan
</button>


<button class="reset" id="reset">
🔄 Herstel standaard
</button>


<button class="inst" id="terug">
⬅ Terug
</button>


</div>


</div>




<script>


const standaard=[


[
"H1","H2","H3","H4",
"Zingen","Tekenen","Schrijven","Lezen",
"Klimmen","Gooien","Vangen","Fietsen",
"Zitten","Liggen","Fluiten","Lachen",
"Koken","Bouwen","Rollen","Rust"
],


[
"Rode bal","Blauwe bal","Touw","Boek",
"Kussen","Stoel","Zaklamp","Paraplu",
"Emmer","Doos","Speelkaart","Bloem",
"Fles","Ring","Pet","Potlood",
"Lamp","Tafel","Dobbelsteen","Horloge"
],


[
"10 seconden","20 seconden","30 seconden",
"1 minuut","2 minuten","3 minuten",
"5 minuten","10 minuten","15 minuten",
"20 minuten","25 minuten","30 minuten",
"40 minuten","45 minuten","1 uur",
"2 uur","3 uur","5 uur","1 dag",
"Tot stoppen"
],


[
"1","2","3","4","5","6","8",
"10","12","15","20","25","30",
"40","50","75","100","150",
"200","Onbeperkt"
]


];


let lijsten=
JSON.parse(localStorage.getItem("lijsten"))
|| JSON.parse(JSON.stringify(standaard));



let vorig=[
"","","",""
];



function randomKeuze(n){

let keuze;

do{
keuze=
lijsten[n][Math.floor(Math.random()*20)];
}
while(keuze===vorig[n]);

vorig[n]=keuze;

return keuze;

}



function draai(n){


let slot=document.getElementById("slot");

let uit=document.getElementById("uit"+(n+1));


let teller=0;


slot.classList.add("draaien");


let timer=setInterval(()=>{


slot.textContent=
lijsten[n][Math.floor(Math.random()*20)];


teller++;


if(teller>12){

clearInterval(timer);


let keuze=randomKeuze(n);


slot.textContent=keuze;

uit.textContent=keuze;


slot.classList.remove("draaien");


if(navigator.vibrate)
navigator.vibrate(80);


}


},80);


}



for(let i=0;i<4;i++){

document.getElementById("knop"+(i+1))
.addEventListener("click",()=>draai(i));

}





function toonInstellingen(){


document.getElementById("spel")
.classList.add("verberg");


document.getElementById("instellingen")
.classList.remove("verberg");


maakVelden();

}



function maakVelden(){


let div=document.getElementById("velden");

div.innerHTML="";


let namen=[
"Handeling",
"Attributen",
"Duur",
"Aantal"
];


for(let i=0;i<4;i++){


let titel=document.createElement("h2");

titel.textContent=namen[i];

div.appendChild(titel);



for(let j=0;j<20;j++){


let input=document.createElement("input");

input.value=lijsten[i][j];

input.dataset.wiel=i;

input.dataset.nr=j;


div.appendChild(input);


}


}


}



document.getElementById("naarInstellingen")
.onclick=toonInstellingen;



document.getElementById("terug")
.onclick=function(){

document.getElementById("instellingen")
.classList.add("verberg");


document.getElementById("spel")
.classList.remove("verberg");

};



document.getElementById("opslaan")
.onclick=function(){


let inputs=document.querySelectorAll("#velden input");


inputs.forEach(i=>{

lijsten[i.dataset.wiel][i.dataset.nr]=i.value;

});


localStorage.setItem(
"lijsten",
JSON.stringify(lijsten)
);


alert("Opgeslagen");

};



document.getElementById("reset")
.onclick=function(){

if(confirm("Alles terug naar standaard?")){


lijsten=
JSON.parse(JSON.stringify(standaard));


localStorage.removeItem("lijsten");


maakVelden();

}


};



</script>


</body>
</html>
