<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuzemachine Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Keuzemachine Pro">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="apple-touch-icon" href="icon-512.png">

</head>


<body>

<div class="app">


<header>

<h1>🎰 Keuzemachine Pro</h1>

<div class="spelnaam">
Spel: <strong id="spelNaam">
Mijn spel
</strong>
</div>

</header>



<main id="wielen">


<!-- Wielen worden automatisch door JavaScript gemaakt -->


</main>



<button class="instellingenKnop" id="openInstellingen">

⚙️ Instellingen

</button>



</div>




<div id="instellingen" class="verborgen">


<h1>⚙️ Instellingen</h1>


<div id="instellingLijsten">
</div>

<button id="nieuwWiel">
➕ Nieuw wiel
</button>

<button id="exporteerSpel">
⬇️ Exporteer spel
</button>

<button id="importeerSpelKnop">
⬆️ Importeer spel
</button>

<input 
type="file" 
id="importeerBestand" 
accept=".json"
class="verborgen">
  
<div id="instellingLijsten">
</div>

<button id="terugKnop">

⬅ Terug

</button>


</div>

<!-- Nieuw wiel scherm -->

<div id="nieuwWielScherm" class="verborgen">


<h1>➕ Nieuw wiel</h1>


<div class="lijst">

<h2>Naam wiel</h2>

<input 
id="nieuwWielNaam"
type="text"
placeholder="bijvoorbeeld Plaats"
>


<h2>Icoon</h2>

<input 
id="nieuwWielIcoon"
type="text"
value="🌍"
>


<h2>Keuzes</h2>


<div id="nieuweKeuzes">


<textarea 
class="keuzeRegel"
placeholder="Eerste keuze">
</textarea>


</div>


<button id="regelToevoegen">

➕ Regel toevoegen

</button>


<button id="bewaarNieuwWiel">

💾 Opslaan

</button>


<button id="annuleerNieuwWiel">

⬅ Annuleren

</button>


</div>


</div>



<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", function(){

navigator.serviceWorker.register(
"service-worker.js"
);

});

}

</script>
  
</body>

</html>
