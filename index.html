<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuzemachine Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Keuzemachine Pro">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="apple-touch-icon" href="icon-512.png">

</head>


<body>

<div class="app">


<header>

<h1>🎰 Keuzemachine Pro</h1>

<div class="spelnaam">
Spel: <strong id="spelNaam">
Mijn spel
</strong>
</div>

</header>



<main id="wielen">


<!-- Wielen worden automatisch door JavaScript gemaakt -->


</main>



<button class="instellingenKnop" id="openInstellingen">

⚙️ Instellingen

</button>



</div>




<div id="instellingen" class="verborgen">


<h1>⚙️ Instellingen</h1>


<div id="instellingLijsten">


</div>


<button id="terugKnop">

⬅ Terug

</button>


</div>





<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", function(){

navigator.serviceWorker.register(
"service-worker.js"
);

});

}

</script>
  
</body>

</html>
