<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>KeuzeHulp Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111827">

</head>


<body>


<div class="app">


<header>

<h1>KeuzeHulp</h1>

<button id="instellingenKnop">
⚙️
</button>

</header>
<section id="resultaat">
<div id="samenvatting">
Druk op de knoppen
</div>

</section>

<main id="wielen">

</main>


</div>





<!-- INSTELLINGEN -->

<div id="instellingen"
class="pagina verborgen">


<h1>⚙️ Instellingen</h1>


<div id="wielBeheer">

</div>



<button id="nieuwWiel">
➕ Nieuw wiel
</button>


<button id="exporteerSpel">
⬇️ Exporteer spel
</button>


<button id="importeerSpelKnop">
⬆️ Importeer spel
</button>


<input
type="file"
id="importeerBestand"
accept=".json"
hidden>



<button id="terugKnop">
⬅️ Terug
</button>


</div>





<!-- NIEUW / BEWERK WIEL -->


<div id="wielEditor"
class="pagina verborgen">


<h1 id="editorTitel">
Nieuw wiel
</h1>


<label>
Naam
</label>

<input
id="wielNaam"
placeholder="Naam wiel">



<label>
Icoon
</label>

<input
id="wielIcoon"
placeholder="🎯">



<label>
Keuzes (één per regel)
</label>


<textarea
id="wielKeuzes"
rows="12"
placeholder="Amsterdam
Porto
Lagos">
</textarea>



<button id="opslaanWiel">
💾 Opslaan
</button>


<button id="annuleerWiel">
Annuleren
</button>


</div>





<script src="app.js"></script>



<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}

</script>


</body>

</html>
